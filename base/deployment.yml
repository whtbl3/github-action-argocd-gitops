apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app             # tên chung, overlay sẽ không đổi
spec:
  replicas: 1              # mặc định, overlay có thể override
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: ghcr.io/whtbl3/my-app:latest  # overlay sẽ đổi tag
          ports:
            - containerPort: 8080